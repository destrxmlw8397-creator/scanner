<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Barcode Scanner</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#000;
    color:white;
    text-align:center;
}
video{
    width:100%;
    height:auto;
    max-height:70vh;
    border:3px solid #00ffcc;
    border-radius:12px;
}
.controls{
    margin-top:15px;
}
button{
    padding:12px 20px;
    margin:8px;
    border:none;
    border-radius:8px;
    font-weight:bold;
    background:#00ffcc;
}
.result{
    margin-top:15px;
    font-size:18px;
    background:#111;
    padding:10px;
    border-radius:10px;
}
</style>
</head>
<body>

<h2>📷 Pro Barcode Scanner</h2>

<video id="video"></video>

<div class="result">
    <div>স্ক্যান ফলাফল:</div>
    <strong id="result">Waiting...</strong>
</div>

<div class="controls">
    <button onclick="toggleFlash()">🔦 Flash</button>
    <button onclick="stopScanner()">⛔ Stop</button>
</div>

<audio id="beep" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>

<script>
let codeReader = new ZXing.BrowserMultiFormatReader();
let selectedDeviceId;
let currentStream;
let flashOn = false;

async function startScanner() {
    const video = document.getElementById('video');
    const resultBox = document.getElementById('result');

    try {
        const devices = await codeReader.listVideoInputDevices();
        const backCam = devices.find(d => d.label.toLowerCase().includes('back')) || devices[0];
        selectedDeviceId = backCam.deviceId;

        codeReader.decodeFromVideoDevice(selectedDeviceId, video, (result, err) => {
            if (result) {
                resultBox.textContent = result.text;

                document.getElementById("beep").play();
                navigator.vibrate(200);
            }
        });

        currentStream = video.srcObject;

    } catch (err) {
        alert("Camera Error: " + err);
    }
}

function stopScanner(){
    codeReader.reset();
}

async function toggleFlash(){
    const track = currentStream?.getVideoTracks()[0];
    if (!track) return;

    const capabilities = track.getCapabilities();
    if (!capabilities.torch) {
        alert("Flashlight supported না");
        return;
    }

    flashOn = !flashOn;

    await track.applyConstraints({
        advanced: [{ torch: flashOn }]
    });
}

window.onload = startScanner;
</script>

</body>
</html>
