<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus Barcode Scanner</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>
body{
    margin:0;
    background:#000;
    overflow:hidden;
    font-family:Arial;
}

#container{
    position:relative;
    width:100vw;
    height:100vh;
}

video{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
}

/* Dark overlay */
.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
}

/* Focus box */
.focus-box{
    position:absolute;
    top:50%;
    left:50%;
    width:280px;
    height:180px;
    transform:translate(-50%,-50%);
    border:3px solid #00ffcc;
    border-radius:15px;
    box-shadow:0 0 15px #00ffcc;
}

/* Transparent hole effect */
.mask{
    position:absolute;
    width:100%;
    height:100%;
    pointer-events:none;
    background:
        linear-gradient(#000000aa,#000000aa) top/100% calc(50% - 90px) no-repeat,
        linear-gradient(#000000aa,#000000aa) bottom/100% calc(50% - 90px) no-repeat,
        linear-gradient(#000000aa,#000000aa) left/ calc(50% - 140px) 180px no-repeat,
        linear-gradient(#000000aa,#000000aa) right/ calc(50% - 140px) 180px no-repeat;
}

/* Scan line animation */
.scan-line{
    position:absolute;
    width:100%;
    height:2px;
    background:#00ffcc;
    top:0;
    animation:scan 2s infinite;
}

@keyframes scan{
    0%{top:0;}
    100%{top:178px;}
}

.result{
    position:absolute;
    bottom:30px;
    width:100%;
    text-align:center;
    color:white;
    font-size:18px;
}
</style>
</head>
<body>

<div id="container">
    <video id="video"></video>
    <div class="overlay"></div>

    <div class="focus-box">
        <div class="scan-line"></div>
    </div>

    <div class="mask"></div>

    <div class="result">
        <div>স্ক্যান ফলাফল:</div>
        <strong id="result">Waiting...</strong>
    </div>
</div>

<audio id="beep" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>

<script>
let codeReader = new ZXing.BrowserMultiFormatReader();

async function startScanner(){
    const video = document.getElementById('video');
    const resultBox = document.getElementById('result');

    try{
        const devices = await codeReader.listVideoInputDevices();
        const backCam = devices.find(d => d.label.toLowerCase().includes('back')) || devices[0];

        codeReader.decodeFromVideoDevice(backCam.deviceId, video, (result, err) => {
            if(result){
                resultBox.textContent = result.text;
                document.getElementById("beep").play();
                navigator.vibrate(200);
            }
        });

    }catch(err){
        alert("Camera error: " + err);
    }
}

window.onload = startScanner;
</script>

</body>
</html>
