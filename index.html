<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সহজ বারকোড স্ক্যানার</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f4; padding: 20px; }
        #reader { width: 100%; max-width: 500px; margin: auto; background: white; padding: 10px; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        #result { margin-top: 20px; font-size: 1.2rem; color: #333; word-wrap: break-word; }
        h2 { color: #007bff; }
    </style>
</head>
<body>

    <h2>আমার বারকোড স্ক্যানার</h2>
    <div id="reader"></div>
    <div id="result">স্ক্যান করার জন্য ক্যামেরা পারমিশন দিন...</div>

    <script>
        function onScanSuccess(decodedText, decodedResult) {
            // স্ক্যান সফল হলে এখানে রেজাল্ট দেখাবে
            document.getElementById('result').innerHTML = `
                <strong style="color: green;">স্ক্যান সফল!</strong><br>
                ফলাফল: <a href="${decodedText}" target="_blank">${decodedText}</a>
            `;
            // চাইলে স্ক্যান হওয়ার পর ক্যামেরা বন্ধ করে দিতে পারেন:
            // html5QrcodeScanner.clear();
        }

        function onScanFailure(error) {
            // স্ক্যান চলাকালীন প্রতি ফ্রেমের এরর এখানে আসবে (এটি ইগনোর করা ভালো)
        }

        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", { fps: 10, qrbox: {width: 250, height: 150} }
        );
        
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    </script>
</body>
</html>
